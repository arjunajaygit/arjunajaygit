<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#79C0FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="218" rx="13" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- terminal title bar -->
  <rect x="0" y="0" width="1200" height="38" rx="14" fill="#161b22"/>
  <rect x="0" y="24" width="1200" height="14" fill="#161b22"/>
  <circle cx="26" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="19" r="6" fill="#27c93f"/>
  <text x="600" y="24" text-anchor="middle" font-family="Consolas, 'Fira Code', monospace" font-size="13" fill="#8b949e">arjun@github: ~</text>

  <!-- prompt line -->
  <text x="48" y="98" font-family="Consolas, 'Fira Code', monospace" font-size="22" fill="#3fb950">arjun@devbox</text>
  <text x="220" y="98" font-family="Consolas, 'Fira Code', monospace" font-size="22" fill="#8b949e">:</text>
