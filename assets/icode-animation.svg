<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="100%" height="120" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Glowing Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF">
        <animate attributeName="stop-color" values="#58A6FF; #79c0ff; #1f6feb; #58A6FF" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#79c0ff">
        <animate attributeName="stop-color" values="#79c0ff; #58A6FF; #79c0ff; #58A6FF" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#388bfd">
        <animate attributeName="stop-color" values="#388bfd; #58A6FF; #79c0ff; #388bfd" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" />
      <stop offset="50%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#30363d" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg {
      fill: url(#card-grad);
      stroke: url(#border-grad);
      stroke-width: 1.5;
      rx: 12px;
    }
    
    .prompt {
      font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
      font-size: 20px;
      font-weight: 600;
      fill: #8b949e;
    }
    
    .code-text {
      font-family: 'Fira Code', 'JetBrains Mono', 'Segoe UI', monospace;
      font-size: 40px;
      font-weight: 800;
      fill: url(#text-grad);
      filter: url(#glow);
      letter-spacing: 2px;
    }

    .cursor {
      fill: #58A6FF;
      animation: blink 0.8s infinite alternate;
    }

    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .subtext {
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      fill: #8b949e;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .line-animation {
      stroke: url(#text-grad);
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: drawLine 3s ease-in-out infinite alternate;
    }

    @keyframes drawLine {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Card Background -->
  <rect x="2" y="2" width="696" height="116" class="bg" />

  <!-- Animated Accent Lines -->
  <line x1="40" y1="98" x2="660" y2="98" stroke="#21262d" stroke-width="2" stroke-linecap="round" />
  <line x1="40" y1="98" x2="660" y2="98" stroke-width="2" stroke-linecap="round" class="line-animation" />

  <!-- Terminal Content -->
  <g transform="translate(40, 58)">
    <!-- Terminal Prompt -->
    <text x="0" y="0" class="prompt">arjun@devbox:~$</text>
    
    <!-- Animated "I code." text -->
    <text x="180" y="2" class="code-text">I code<tspan fill="#58A6FF">.</tspan></text>

    <!-- Blinking Cursor Block -->
    <rect x="330" y="-32" width="13" height="36" class="cursor" rx="2" />
  </g>

  <!-- Tagline underneath -->
  <text x="40" y="88" class="subtext">architecting from 0 → 1</text>
</svg>
